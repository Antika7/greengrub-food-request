spring:
  # Direct JDBC connection to Cloud SQL via public IP (Cloud SQL Auth Proxy not used)
  cloud:
    gcp:
      sql:
        enabled: false   # Cloud SQL auto-config disabled; using direct JDBC URL

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

    hikari:
      connection-timeout: 30000
      maximum-pool-size: 20
      minimum-idle: 10
      idle-timeout: 300000
      max-lifetime: 1200000

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

grpc:
  server:
    port: ${FOOD_GRPC_SERVER_PORT:9091}
  client:
    imageService:
      address: static://${IMAGE_SERVICE_HOST}:${IMAGE_GRPC_SERVICE_PORT:9095}
      negotiation-type: plaintext

# CORS — empty default. Gateway is the only legitimate caller in production.
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}


# --- Resilience4j ---
resilience4j:
  retry:
    instances:
      dbRetry:
        max-attempts: 3
        wait-duration: 200ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
      imageRetry:
        max-attempts: 3
        wait-duration: 1s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - com.greengrub.food_request.exception.ImageHydrationFailedException
          - com.greengrub.food_request.exception.ImageUploadFailedException

  circuitbreaker:
    instances:
      dbBreaker:
        failure-rate-threshold: 50
        sliding-window-size: 10
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true
      imageBreaker:
        failure-rate-threshold: 50
        sliding-window-size: 10
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true

  timelimiter:
    instances:
      imageUploadLimiter:
        timeout-duration: 10s
        cancel-running-future: true
      imageReadLimiter:
        timeout-duration: 2s
        cancel-running-future: true

#Setting up swagger for the cloud profile
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    root: INFO
    com.greengrub: DEBUG          # or INFO in production
    org.springframework: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

eureka:
  client:
    enabled: false
