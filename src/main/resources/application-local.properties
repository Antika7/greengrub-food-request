# --- Postgres (docker) ---
spring.datasource.url=jdbc:postgresql://localhost:5432/foods
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway owns the schema. Hibernate validates only.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# --- gRPC server (food-service exposes FoodService here) ---
grpc.server.port=9091

# --- gRPC client (image-service hydration) ---
grpc.client.imageService.address=static://localhost:9095
grpc.client.imageService.negotiation-type=plaintext

# --- CORS (React dev servers on local) ---
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://localhost:5773

# --- Resilience4j ---

# Retry: Postgres reads (3 attempts, exponential backoff: 200ms -> 400ms -> 800ms)
resilience4j.retry.instances.dbRetry.max-attempts=3
resilience4j.retry.instances.dbRetry.wait-duration=200ms
resilience4j.retry.instances.dbRetry.enable-exponential-backoff=true
resilience4j.retry.instances.dbRetry.exponential-backoff-multiplier=2

# Retry: image-service gRPC calls (upload + hydration; 3 attempts, 1s -> 2s -> 4s)
resilience4j.retry.instances.imageRetry.max-attempts=3
resilience4j.retry.instances.imageRetry.wait-duration=1s
resilience4j.retry.instances.imageRetry.enable-exponential-backoff=true
resilience4j.retry.instances.imageRetry.exponential-backoff-multiplier=2
resilience4j.retry.instances.imageRetry.retry-exceptions=com.greengrub.food_request.exception.ImageHydrationFailedException,com.greengrub.food_request.exception.ImageUploadFailedException

# Circuit Breaker: Postgres (lighter thresholds for dev)
resilience4j.circuitbreaker.instances.dbBreaker.failure-rate-threshold=60
resilience4j.circuitbreaker.instances.dbBreaker.sliding-window-size=5
resilience4j.circuitbreaker.instances.dbBreaker.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.dbBreaker.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.dbBreaker.register-health-indicator=true

# Circuit Breaker: image-service (lighter thresholds for dev)
resilience4j.circuitbreaker.instances.imageBreaker.failure-rate-threshold=60
resilience4j.circuitbreaker.instances.imageBreaker.sliding-window-size=5
resilience4j.circuitbreaker.instances.imageBreaker.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.imageBreaker.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.imageBreaker.register-health-indicator=true

# TimeLimiters (TimeLimiter requires CompletableFuture-returning methods)
resilience4j.timelimiter.instances.imageUploadLimiter.timeout-duration=10s
resilience4j.timelimiter.instances.imageUploadLimiter.cancel-running-future=true
resilience4j.timelimiter.instances.imageReadLimiter.timeout-duration=2s
resilience4j.timelimiter.instances.imageReadLimiter.cancel-running-future=true

# Logging
logging.level.root=INFO
logging.level.com.greengrub=DEBUG
logging.level.org.springframework=INFO
logging.pattern.console="%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# Eureka
eureka.client.enabled=true
